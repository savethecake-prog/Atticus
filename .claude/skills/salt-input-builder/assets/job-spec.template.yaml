# JOB SPEC  (generated by Claude from your brief, then confirmed by you)
# You never hand-author this from scratch. Claude fills it in from the intake
# interview and the detected schema, shows it to you, and only proceeds once
# you sign off. It is the contract for the run and the thing a fresh session
# resumes from.

job:
  name: ""                      # e.g. "Batch-03 Components"
  client: ""                    # optional
  template: ""                  # path to the blank workbook to populate
  output_dir: ""

# What to populate and the source rules.
source_policy:
  tier_order: [manufacturer, retailer]   # manufacturer first, retailer fallback
  allow_retailer_fallback: true
  manufacturer_only_fields: []           # fields that must be manufacturer-tier or left blank
  blank_if_unverifiable: true            # never guess; blank + flag instead

# Who counts as which authority. Resolution order at runtime:
#   1) explicit lists below  2) brand's own official domain = manufacturer
#   3) reputable_retailers allowlist = retailer  4) anything else = NOT a source
authority:
  infer_brand_domain: true
  manufacturer_domains: []      # per-job overrides, e.g. ["cougargaming.com", "thermalright.com"]
  reputable_retailers: []       # e.g. ["takealot.com", "amazon.*", "newegg.com", "microcenter.com"]

# Confidence colours (fill, font hex). Defaults shown; override only if needed.
confidence_colours:
  manufacturer: {fill: "C6EFCE", font: "006100"}
  retailer:     {fill: "FFEB9C", font: "9C6500"}
  client:       {fill: "DDEBF7", font: "1F4E78"}
  derived:      {fill: "F2F2F2", font: "595959"}
  unverifiable: {fill: "FFC7CE", font: "9C0006"}

# Category profiles are BUILT by inspecting the data (see references/
# category-profiles.md), confirmed, saved, and mapped here per tab/category.
# Reuse a saved profile only when a product genuinely matches it.
category_profiles: {}     # e.g. {Fans: profiles/cougar-fans.yaml, Motherboard: profiles/asus-mb.yaml}

gates:
  mode: adaptive                # adaptive | all | final_only
  # adaptive: run end-to-end, pausing only to clear the "needs you" queue
  # (gaps, source conflicts, identity/title clashes, suspected input errors,
  #  low-confidence schema detection).

deliverables: [workbook, audit_report, evidence_ledger, schema_profile]

# The items to populate. Identity fields are client-provided (your inventory),
# so they are sourced as provenance: client, not from the web.
items: []
#  - tab: "Fans"
#    row: 7
#    client_fields: {brand: "Cougar", sku: "3MSC14FA1.0001", category: "..."}
#    notes: ""

# Things NOT to do (explicit, so they are part of the contract):
do_not:
  - "Never write a value that is not in the ledger with a real source."
  - "Never construct or guess a URL; only use links returned by a search/fetch."
  - "Never silently 'fix' a suspected client input error; flag it."
